<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>jim playground</title>
    <!-- Cross-origin isolation so the in-browser C toolchain (Wasmer) can use
         SharedArrayBuffer. GitHub Pages can't set COOP/COEP headers, so this
         service worker injects them; credentialless keeps the CDN loads working.
         Must run first. Only effective at the top level (the full-screen page),
         not inside the docs iframe — see the Run handler. -->
    <script>
      window.coi = { coepCredentialless: () => true };
    </script>
    <script src="coi-serviceworker.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/monokai.min.css"
    />
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/mode/simple.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
  </head>
  <body>
    <header>
      <div class="brand">jim <span>playground</span></div>
      <div class="actions">
        <select id="examples" title="Load an example" aria-label="Load an example">
          <option value="vec2">Operators (Vec2)</option>
          <option value="hello">Hello, world</option>
          <option value="fizzbuzz">FizzBuzz</option>
          <option value="primes">Prime sieve</option>
          <option value="optionals">Optionals</option>
          <option value="errors">try / catch</option>
          <option value="generics">Generic functions</option>
        </select>
        <span id="status" class="status">loading…</span>
        <button id="run" class="btn-run" disabled>Run ▸</button>
      </div>
    </header>

    <main>
      <section class="pane">
        <div class="pane-title">your jim <span id="version"></span></div>
        <div id="editor" class="editor"></div>
      </section>
      <section class="pane">
        <div class="pane-title">generated C11</div>
        <div id="output" class="editor"></div>
        <pre id="error" class="error" hidden></pre>
      </section>
    </main>

    <div id="console" class="console" hidden>
      <div class="console-title">
        <span>program output</span>
        <span id="run-status" class="muted"></span>
        <button id="console-close" class="close" title="Close">×</button>
      </div>
      <pre id="run-output"></pre>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
